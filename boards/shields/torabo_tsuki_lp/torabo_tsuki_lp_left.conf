# =========================================================
# Section: ZMK Studio
# =========================================================
CONFIG_ZMK_STUDIO=y
# CONFIG_ZMK_STUDIO_LOCKING=n
CONFIG_ZMK_SETTINGS_RPC=y

# =========================================================
# Section: Connectivity & Stability (接続・通信)
# =========================================================
# ペアリング上限・接続上限（7台に拡張）
CONFIG_BT_MAX_PAIRED=5
CONFIG_BT_MAX_CONN=5

# 出力強度の調整（+8dBmで安定性重視）
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Bluetoothの接続管理を細かく行う
CONFIG_ZMK_BLE_MANAGEMENT=y

# 通信安定化の独自設定（1Mbps固定・干渉への耐性強化）
# CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
# CONFIG_BT_CTLR_PHY_2M=n
# CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n

# 接続間隔の短縮や動き出し遅延対策（必要に応じてコメントアウト解除）
# CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
# CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12
# CONFIG_BT_PERIPHERAL_PREF_LATENCY=0

# =========================================================
# Section: Split Keyboard (分割キーボード専用設定)
# =========================================================
# セントラル側のメモリ割り当てを増やしクラッシュを防止
CONFIG_ZMK_SPLIT_BLE_CENTRAL_SPLIT_RUN_STACK_SIZE=768
# 左右間でイベントを正確にリレーする
CONFIG_ZMK_SPLIT_RELAY_EVENT=y

# =========================================================
# Section: Battery & Power Management
# =========================================================
# バッテリー残量の同期・履歴・USB接続時の挙動（左手・セントラル用）
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_BATTERY_HISTORY=y
CONFIG_ZMK_BATTERY_SKIP_IF_USB_POWERED=n

# 特殊な電池（乾電池やニッケル水素等）用の電圧閾値
CONFIG_ZMK_NON_LIPO_MIN_MV=1000
CONFIG_ZMK_NON_LIPO_LOW_MV=900

# スリープのタイムアウト（有効化: 約2.5時間でスリープ）
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=9000000

# =========================================================
# Section: System & Input Performance
# =========================================================
# チャタリング防止と応答速度の高速化（維持）
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=3
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=3

# 設定の保存頻度を減らし、フラッシュメモリの寿命を延ばす
# （前回のご相談通り 10000 のままとします）
CONFIG_ZMK_SETTINGS_SAVE_DEBOUNCE=10000

# その他システム必須設定
CONFIG_ZMK_CDC_ACM_BOOTLOADER_TRIGGER=y
CONFIG_ZMK_STATUS_LED=y
